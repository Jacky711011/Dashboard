name: Market Status Auto Update

on:
  schedule:
    # 這裡設定的時間是國際標準時 (UTC)
    # 星期一到星期五的 00:00 (台灣時間早上 08:00，開盤前初始化)
    - cron: '0 0 * * 1-5'
    # 星期一到星期五的 06:30 (台灣時間下午 14:30，盤後清算最新價)
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 保留手動觸發按鈕

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pytz

    - name: 執行大盤數據爬蟲
      run: python update_market.py

    - name: 檢查檔案狀態並提交回 GitHub
      run: |
        git config --global user.name "WarRoom-Bot"
        git config --global user.email "bot@github.com"
        git add market_status.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新台美大盤最新戰況" && git push)
