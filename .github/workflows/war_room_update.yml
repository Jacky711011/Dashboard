name: Market Status Auto Update

on:
  schedule:
    # 🎯 10分鐘夜盤排程：每 10 分鐘執行一次 (對應台灣時間 15:00 - 23:50)
    - cron: '*/10 7-15 * * 1-5'
    # 🎯 10分鐘半夜盤排程：每 10 分鐘執行一次 (對應台灣時間 00:00 - 05:00)
    - cron: '*/10 16-21 * * 1-5'
    # 盤後結算排程 (台灣時間下午 14:30 抓當日法人籌碼)
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 保留手動觸發按鈕

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests pytz

    - name: 執行大盤與美股ADR高頻爬蟲
      run: python update_market.py

    - name: 檢查檔案狀態並提交回 GitHub
      run: |
        git config --global user.name "WarRoom-Bot"
        git config --global user.email "bot@github.com"
        git add market_status.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 10分鐘夜盤美股高頻同步" && git push)
